<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Info Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-200 font-sans h-screen w-screen overflow-hidden flex flex-col p-6">

    <div id="loadingState" class="flex-1 flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-slate-700 border-t-amber-500 rounded-full animate-spin mb-4"></div>
        <p class="text-slate-400 font-bold tracking-widest uppercase text-xs" id="loadingText">Fetching Job Info...</p>
    </div>

    <div id="errorState" class="hidden flex-1 flex flex-col items-center justify-center text-center">
        <div class="bg-red-500/10 text-red-400 p-4 rounded-xl border border-red-500/20 max-w-sm">
            <svg class="w-8 h-8 mx-auto mb-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <h3 class="font-bold text-white mb-1" id="errorTitle">Could Not Load Job</h3>
            <p class="text-xs text-red-300" id="errorMsg">The CRM deal could not be found.</p>
        </div>
    </div>

    <div id="appState" class="hidden h-full flex flex-col space-y-6">
        <!-- Header / Job Name -->
        <div class="flex justify-between items-start border-b border-slate-800 pb-4">
            <div>
                <p class="text-[10px] font-bold text-amber-500 tracking-widest uppercase mb-1">CRM Deal Snapshot</p>
                <h1 class="text-2xl font-black text-white leading-tight" id="uiDealName">Loading...</h1>
                <p class="text-sm text-slate-400 mt-1 flex items-center gap-1">
                    <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.242-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span id="uiAddress">No Address</span>
                </p>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-emerald-500 tracking-widest uppercase mb-1">Job Value</p>
                <div class="bg-emerald-500/10 border border-emerald-500/20 px-4 py-2 rounded-lg inline-block">
                    <span class="text-xl font-bold text-emerald-400" id="uiAmount">$0.00</span>
                </div>
            </div>
        </div>

        <!-- Notes Section -->
        <div class="flex-1 flex flex-col bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden">
            <div class="bg-slate-800 px-4 py-3 border-b border-slate-700 flex justify-between items-center">
                <h3 class="font-bold text-slate-200 text-sm flex items-center gap-2">
                    <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Production Notes
                </h3>
            </div>
            <div class="flex-1 p-4 overflow-y-auto">
                <div id="uiNotes" class="text-slate-300 text-sm whitespace-pre-wrap leading-relaxed font-serif">
                    No notes provided for this job.
                </div>
            </div>
        </div>
        
        <!-- Footer Info -->
        <div class="grid grid-cols-2 gap-4">
             <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                <p class="text-[10px] font-bold text-slate-500 tracking-widest uppercase mb-1">Stage</p>
                <p class="text-sm font-semibold text-slate-200" id="uiStage">-</p>
             </div>
             <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                <p class="text-[10px] font-bold text-slate-500 tracking-widest uppercase mb-1">Closing Date</p>
                <p class="text-sm font-semibold text-slate-200" id="uiDate">-</p>
             </div>
        </div>
    </div>

    <script>
        function showError(title, msg) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('appState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorTitle').innerText = title;
            document.getElementById('errorMsg').innerText = msg;
        }

        function showApp(deal) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.add('hidden');
            document.getElementById('appState').classList.remove('hidden');

            document.getElementById('uiDealName').innerText = deal.Deal_Name || "Unknown Deal";
            
            // Format Amount
            const amount = parseFloat(deal.Amount || 0);
            document.getElementById('uiAmount').innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
            
            // Address Fallback Logic
            let address = deal.Site_Address || deal.Job_Address || deal.Address || deal.Billing_Street || deal.Deal_Name || "No Address Provided";
            document.getElementById('uiAddress').innerText = address;
            
            document.getElementById('uiNotes').innerText = deal.Description || deal.Production_Notes || deal.Notes || "No notes provided.";
            
            document.getElementById('uiStage').innerText = deal.Stage || "Unknown";
            document.getElementById('uiDate').innerText = deal.Closing_Date || "Unknown";
        }

        document.addEventListener('DOMContentLoaded', () => {
            ZOHO.embeddedApp.on("PageLoad", async function(data) {
                console.log("Projects context loaded:", data);
                
                try {
                    let projectId = null;
                    let projectName = null;
                    let crmDealId = null;

                    // Support multiple payload structures just in case
                    if (data && data.project) {
                        projectId = data.project.id;
                        projectName = data.project.name;
                        const desc = data.project.description || "";
                        
                        // Check if CRM_ID is magically hidden in description
                        const match = desc.match(/\[CRM_ID:\s*(\d+)\]/i);
                        if (match) {
                            crmDealId = match[1];
                        }
                    }

                    if (!projectName && !crmDealId) {
                        showError("Missing Project Context", "Could not read the project details from Zoho Projects.");
                        return;
                    }

                    document.getElementById('loadingText').innerText = "Connecting to CRM...";

                    // We need a connection named "zoho_crm_connection" configured in the developer portal
                    let apiUrl = "";
                    if (crmDealId) {
                        apiUrl = `https://www.zohoapis.com/crm/v6/Deals/${crmDealId}`;
                    } else {
                        // Strip " - Production" from Project Name to match Deal Name
                        let cleanName = projectName.replace(" - Production", "").trim();
                        apiUrl = `https://www.zohoapis.com/crm/v6/Deals/search?criteria=(Deal_Name:equals:${encodeURIComponent(cleanName)})`;
                    }

                    const req_data = {
                        url: apiUrl,
                        method: "GET",
                        connection: "zoho_crm_connection"
                    };

                    ZOHO.embeddedApp.request(req_data).then(function(response) {
                        console.log("CRM Response:", response);
                        
                        try {
                            const parsed = typeof response === "string" ? JSON.parse(response) : response;
                            let dealData = null;

                            // Traverse nested details/statusMessage if invoke wraps it
                            let innerData = parsed;
                            if (parsed && parsed.details && parsed.details.statusMessage) {
                                innerData = typeof parsed.details.statusMessage === "string" ? JSON.parse(parsed.details.statusMessage) : parsed.details.statusMessage;
                            }

                            if (innerData && innerData.data && innerData.data.length > 0) {
                                dealData = innerData.data[0];
                            }

                            if (dealData) {
                                showApp(dealData);
                            } else {
                                showError("Deal Not Found", "Could not find a matching Deal in Zoho CRM. Ensure the Project Name matches the Deal Name, or that [CRM_ID: xxx] is in the project description.");
                            }
                        } catch (err) {
                            console.error(err);
                            showError("Parsing Error", "Failed to read the data returned from Zoho CRM.");
                        }
                    }).catch(function(err) {
                        console.error(err);
                        showError("Connection Failed", "Could not connect to Zoho CRM. Ensure 'zoho_crm_connection' is created and authorized in the developer portal.");
                    });

                } catch(e) {
                    showError("Error", e.message);
                }
            });
            ZOHO.embeddedApp.init();
        });
    </script>
</body>
</html>
